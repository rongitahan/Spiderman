const DIFF_COLOR={"Easy":{bg:"#EAF3DE",col:"#27500A"},"Medium":{bg:"#FAEEDA",col:"#633806"},"Hard":{bg:"#FCEBEB",col:"#791F1F"},"Very Hard":{bg:"#EEEDFE",col:"#26215C"},"Final Boss":{bg:"#0a0a1a",col:"#ffaa00"},"TRUE FINAL":{bg:"#003300",col:"#00ff44"}};
const MAX_LIVES=3;
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

function HpBar({pct,color}){
  return <div style={{background:"#e8e8e0",borderRadius:99,height:10,overflow:"hidden"}}>
    <div style={{width:Math.max(0,pct)+"%",height:10,borderRadius:99,background:color,transition:"width 0.4s"}}/>
  </div>;
}

function FaceAnim({FaceComp,pulse=false,size=72}){
  const[frame,setFrame]=useState(0);
  useEffect(()=>{
    if(!pulse)return;
    const t=setInterval(()=>setFrame(f=>f+1),800);
    return()=>clearInterval(t);
  },[pulse]);
  const scale=pulse?(1+Math.sin(frame)*0.04):1;
  return <div style={{transform:`scale(${scale})`,transition:"transform 0.4s",display:"inline-block"}}>
    <FaceComp size={size}/>
  </div>;
}

function App(){
  const[screen,setScreen]=useState("title");
  const[selectedPlayer,setSelectedPlayer]=useState(null);
  const[levelIdx,setLevelIdx]=useState(0);
  const[lives,setLives]=useState(MAX_LIVES);
  const[game,setGame]=useState(null);
  const logRef=useRef(null);

  useEffect(()=>{if(logRef.current)logRef.current.scrollTop=logRef.current.scrollHeight;},[game?.logs]);

  function startLevel(playerKey,lvlIdx,currentLives){
    const p=PLAYERS[playerKey];const lv=LEVELS[lvlIdx];const w=WEATHERS[rnd(0,WEATHERS.length-1)];
    setGame({player:{...p,curHP:p.hp},boss:{...lv,curHP:lv.hp},weather:w,weatherRounds:rnd(2,3),turn:"player",
      logs:[`🎮 Level ${lv.id}: ${p.name} faces ${lv.name}! Weather: ${w.icon} ${w.name} — ${w.desc}`],
      over:false,winner:null,dodge:0,protect:false,poisoned:false,poisonTurns:0,websMelted:false,minionActive:false});
    setLives(currentLives);setScreen("battle");
  }

  function addLog(g,msg){return{...g,logs:[...g.logs.slice(-6),msg]};}

  function nextWeather(g){
    if(g.weatherRounds<=1){
      const w=WEATHERS[rnd(0,WEATHERS.length-1)];
      return{...g,weather:w,weatherRounds:rnd(2,3),logs:[...g.logs.slice(-6),`🌤️ Weather → ${w.icon} ${w.name} — ${w.desc}!`]};
    }
    return{...g,weatherRounds:g.weatherRounds-1};
  }

  function playerMove(move){
    if(!game||game.over||game.turn!=="player")return;
    let g={...game,logs:[...game.logs]};
    if(g.websMelted&&(move.icon==="🕸️"||move.name==="Web Shield"||move.name==="Web Slam")){
      g=addLog(g,"🫧 Acid melted your webs! That move won't work! Pick another.");setGame(g);return;
    }
    if(move.sp==="dodge"){
      g.dodge=game.weather.windDodge?2:1;
      g=addLog(g,`${move.icon} ${game.player.name} uses ${move.name}!${game.weather.windDodge?" Wind boost!":""}`);
      g=nextWeather(g);g.turn="boss";setGame(g);setTimeout(()=>bossMove(g),1200);return;
    }
    let miss=game.weather.misschance&&Math.random()<0.35&&move.sp!=="protect";
    let msg="";
    if(miss){msg=`${move.icon} ${move.name} — fog causes a MISS!`;}
    else if(move.sp==="protect"){
      g.protect=true;const d=rnd(move.dmg[0],move.dmg[1]);g.boss={...g.boss,curHP:g.boss.curHP-d};
      msg=`🛡️ Shield up! Taps ${game.boss.name} for ${d} dmg.`;
    }else if(move.sp==="power"){
      let d=rnd(move.dmg[0],move.dmg[1]);
      if(game.weather.dmgBonus>0)d+=game.weather.dmgBonus;
      if(game.weather.storm)d=Math.max(1,d-3);d=Math.max(1,d);
      const isWeak=(move.icon==="🔥"&&game.boss.weakness==="fire")||(move.icon==="🔊"&&game.boss.weakness==="sonic")||(move.icon==="🔵"&&game.boss.weakness==="power")||(move.icon==="🌸"&&game.boss.weakness==="electric")||(move.icon==="🕸️"&&game.boss.weakness==="web");
      if(isWeak)d+=18;
      g.boss={...g.boss,curHP:g.boss.curHP-d};
      msg=`${move.icon} ${move.name} hits for ${d} dmg!${isWeak?" 🎯 WEAKNESS HIT!":""}`;
    }else{
      let d=rnd(move.dmg[0],move.dmg[1])+(game.weather.dmgBonus||0)-(game.weather.dmgPenalty||0);
      if(game.weather.storm)d-=3;
      if(game.boss.weakness==="electric"&&(move.icon==="⚡"||move.name==="Electric Kick"||move.name==="Venom Strike"))d+=12;
      d=Math.max(1,d);
      const pows=["POW!","CRACK!","THWIP!","WHAM!","BOOM!","ZAP!"];
      msg=`${move.icon} ${pows[rnd(0,5)]} ${move.name} hits for ${d} dmg!`;
      g.boss={...g.boss,curHP:g.boss.curHP-d};
    }
    g=addLog(g,msg);g=nextWeather(g);
    if(g.boss.curHP<=0){g.over=true;g.winner="player";g=addLog(g,`🎉 ${game.boss.winMsg}`);setGame(g);return;}
    g.turn="boss";setGame(g);setTimeout(()=>bossMove(g),1200);
  }

  function bossMove(cg){
    setGame(prev=>{
      let g=cg||prev;if(g.over)return g;
      const lv=g.boss;const m=lv.moves[rnd(0,lv.moves.length-1)];let msg="";
      if(g.poisoned&&g.poisonTurns>0){
        const pd=lv.poisonDmgPerTurn||4;
        g={...g,player:{...g.player,curHP:g.player.curHP-pd},poisonTurns:g.poisonTurns-1};
        if(g.poisonTurns===0)g={...g,poisoned:false};
        g=addLog(g,`☣️ Poison burns for ${pd} dmg! ${g.poisonTurns>0?g.poisonTurns+" turns left":"Poison worn off!"}`);
        if(g.player.curHP<=0){g.over=true;g.winner="boss";g=addLog(g,"💀 Dissolved by poison!");return g;}
      }
      if(g.minionActive){
        const md=rnd(8,14);g={...g,player:{...g.player,curHP:g.player.curHP-md}};
        g=addLog(g,`☣️ Acid Minion attacks for ${md} extra dmg!`);
        if(g.player.curHP<=0){g.over=true;g.winner="boss";g=addLog(g,"💀 Overwhelmed by Acid's minions!");return g;}
      }
      if(g.dodge>0){
        msg=`${m.icon} ${lv.name} tries ${m.name}... DODGED!`;g=addLog({...g,dodge:g.dodge-1},msg);
      }else if(g.protect&&m.sp!=="poison"&&m.sp!=="webmelt"){
        let d=Math.max(1,rnd(m.dmg[0],m.dmg[1])-(g.weather.carnagePenalty||0)-(g.weather.storm?3:0));
        const red=Math.floor(d*0.35);
        g=addLog({...g,protect:false,player:{...g.player,curHP:g.player.curHP-red}},`${m.icon} Shield blocks! Only ${red} dmg!`);
      }else{
        let d=Math.max(1,rnd(m.dmg[0],m.dmg[1])-(g.weather.carnagePenalty||0)-(g.weather.storm?3:0));
        if(m.sp==="poison"){g={...g,poisoned:true,poisonTurns:3};msg=`🟢 ACID SPLASH! ${d} dmg + POISONED 3 turns! ☣️`;g={...g,player:{...g.player,curHP:g.player.curHP-d}};}
        else if(m.sp==="webmelt"){g={...g,websMelted:true};msg=`🫧 WEB MELT! Webs dissolved — web moves blocked! +${d} dmg!`;g={...g,player:{...g.player,curHP:g.player.curHP-d}};}
        else if(m.sp==="minion"){g={...g,minionActive:true};msg=`☣️ Acid SPAWNS a minion! ${d} dmg + minion attacks each turn!`;g={...g,player:{...g.player,curHP:g.player.curHP-d}};}
        else{msg=`${m.icon} ${lv.name}'s ${m.name} hits for ${d} dmg!`;g={...g,player:{...g.player,curHP:g.player.curHP-d}};}
        g=addLog(g,msg);
      }
      if(g.player.curHP<=0){g.over=true;g.winner="boss";g=addLog(g,`💀 ${g.player.name} is down!`);}
      else{g.turn="player";}
      return g;
    });
  }

  const card={background:"#fff",border:"0.5px solid #ddd",borderRadius:12,padding:"1rem"};
  const btn={background:"#fff",border:"0.5px solid #bbb",borderRadius:8,padding:"9px 10px",cursor:"pointer",fontFamily:"inherit",fontSize:13};

  if(screen==="title")return(
    <div style={{padding:"1.5rem",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:6}}>🕷️</div>
      <h1 style={{fontSize:22,fontWeight:700,color:"#111",marginBottom:4}}>Spider-Man Universe</h1>
      <p style={{fontSize:13,color:"#666",marginBottom:"1.5rem"}}>17 boss levels — ending with the terrifying ACID! 3 lives per level.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.5rem"}}>
        {Object.values(PLAYERS).map(p=>(
          <div key={p.id} onClick={()=>setSelectedPlayer(p.id)}
            style={{...card,borderTop:`3px solid ${p.color}`,cursor:"pointer",outline:selectedPlayer===p.id?`2px solid ${p.color}`:"none"}}>
            <div style={{marginBottom:8}}><FaceAnim FaceComp={p.face} pulse={selectedPlayer===p.id} size={60}/></div>
            <div style={{fontSize:13,fontWeight:700,color:"#111",marginBottom:3}}>{p.name}</div>
            <div style={{fontSize:11,color:"#666",marginBottom:6}}>{p.desc}</div>
            <span style={{fontSize:11,background:p.light,color:p.dark,padding:"2px 8px",borderRadius:99}}>❤️ {p.hp} HP</span>
          </div>
        ))}
      </div>
      <div style={{background:"#f0efe8",borderRadius:10,padding:"10px 14px",marginBottom:"1.5rem",fontSize:12,color:"#555",textAlign:"left"}}>
        <strong style={{color:"#111"}}>How to play:</strong> 3 lives per level. Lose 3 times → back to Level 1! Beat all 17 bosses to win. 🏆 <strong style={{color:"#00aa22"}}>Tip: Electric moves destroy Acid!</strong>
      </div>
      {selectedPlayer
        ?<button onClick={()=>{setLevelIdx(0);startLevel(selectedPlayer,0,MAX_LIVES);}}
          style={{...btn,padding:"10px 32px",border:`1.5px solid ${PLAYERS[selectedPlayer].color}`,background:PLAYERS[selectedPlayer].light,color:PLAYERS[selectedPlayer].dark,fontSize:15,fontWeight:700}}>
          Start Game ↗
        </button>
        :<p style={{fontSize:13,color:"#888"}}>Pick a hero above!</p>
      }
    </div>
  );

  if(screen==="levelup"){
    const nextLv=LEVELS[levelIdx];const dc=DIFF_COLOR[nextLv.diff]||{bg:"#003300",col:"#00ff44"};
    return(
      <div style={{padding:"1.5rem",textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:6}}>🏆</div>
        <h2 style={{fontSize:20,fontWeight:700,color:"#111",marginBottom:4}}>Level {levelIdx} Complete!</h2>
        <p style={{fontSize:13,color:"#666",marginBottom:"1.5rem"}}>Choose your hero for the next fight!</p>
        <div style={{...card,marginBottom:"1.5rem",background:"#f9f9f6"}}>
          <div style={{marginBottom:6}}><FaceAnim FaceComp={nextLv.face} pulse size={64}/></div>
          <div style={{fontSize:15,fontWeight:700,color:"#111",marginBottom:4}}>Level {nextLv.id}: {nextLv.name}</div>
          <div style={{fontSize:12,color:"#666",marginBottom:8}}>{nextLv.desc}</div>
          <div style={{display:"flex",justifyContent:"center",gap:8,flexWrap:"wrap"}}>
            <span style={{fontSize:11,background:dc.bg,color:dc.col,padding:"2px 10px",borderRadius:99,fontWeight:700}}>{nextLv.diff}</span>
            <span style={{fontSize:11,background:"#FCEBEB",color:"#791F1F",padding:"2px 10px",borderRadius:99}}>❤️ {nextLv.hp} HP</span>
            {nextLv.acidMeltsWebs&&<span style={{fontSize:11,background:"#d4f5d4",color:"#0a2e0a",padding:"2px 10px",borderRadius:99}}>🫧 Melts webs!</span>}
          </div>
        </div>
        <p style={{fontSize:12,color:"#666",marginBottom:10}}>Pick your hero — 3 fresh lives!</p>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:"1.5rem"}}>
          {Object.values(PLAYERS).map(p=>(
            <div key={p.id} onClick={()=>setSelectedPlayer(p.id)}
              style={{...card,borderTop:`3px solid ${p.color}`,cursor:"pointer",outline:selectedPlayer===p.id?`2px solid ${p.color}`:"none"}}>
              <div style={{marginBottom:4}}><FaceAnim FaceComp={p.face} pulse={selectedPlayer===p.id} size={52}/></div>
              <div style={{fontSize:12,fontWeight:700,color:"#111",marginBottom:3}}>{p.name}</div>
              <span style={{fontSize:11,background:p.light,color:p.dark,padding:"1px 6px",borderRadius:99}}>❤️ {p.hp}</span>
            </div>
          ))}
        </div>
        {selectedPlayer
          ?<button onClick={()=>startLevel(selectedPlayer,levelIdx,MAX_LIVES)}
            style={{...btn,padding:"10px 28px",border:`1.5px solid ${PLAYERS[selectedPlayer].color}`,background:PLAYERS[selectedPlayer].light,color:PLAYERS[selectedPlayer].dark,fontWeight:700}}>
            Fight Level {nextLv.id}! ↗
          </button>
          :<p style={{fontSize:13,color:"#888"}}>Pick a hero above!</p>
        }
      </div>
    );
  }

  if(screen==="gameover")return(
    <div style={{padding:"1.5rem",textAlign:"center"}}>
      <div style={{fontSize:52,marginBottom:8}}>💀</div>
      <h1 style={{fontSize:22,fontWeight:700,color:"#111",marginBottom:8}}>Game Over!</h1>
      <p style={{fontSize:14,color:"#666",marginBottom:"1.5rem"}}>You lost 3 times on Level {LEVELS[levelIdx].id} — {LEVELS[levelIdx].name}. Back to the start!</p>
      <div style={{...card,marginBottom:"1.5rem",background:"#f9f9f6"}}>
        <FaceAnim FaceComp={LEVELS[levelIdx].face} size={60}/>
        <p style={{fontSize:13,color:"#666",marginTop:8}}>Heroes never give up — try again!</p>
      </div>
      <button onClick={()=>{setLevelIdx(0);setSelectedPlayer(null);setScreen("title");}}
        style={{...btn,padding:"10px 28px",fontWeight:700,border:"0.5px solid #E24B4A",background:"#FCEBEB",color:"#A32D2D"}}>
        Try Again from Level 1
      </button>
    </div>
  );

  if(screen==="gamecomplete")return(
    <div style={{padding:"1.5rem",textAlign:"center"}}>
      <div style={{fontSize:56,marginBottom:8}}>🏅</div>
      <h1 style={{fontSize:22,fontWeight:700,color:"#111",marginBottom:8}}>YOU BEAT THE GAME!</h1>
      <p style={{fontSize:14,color:"#666",marginBottom:"1.5rem"}}>All 17 villains defeated — even ACID! You are a TRUE ULTIMATE hero!</p>
      <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:"1.5rem",flexWrap:"wrap"}}>
        {Object.values(PLAYERS).map(p=><FaceAnim key={p.id} FaceComp={p.face} pulse size={52}/>)}
      </div>
      <button onClick={()=>{setLevelIdx(0);setSelectedPlayer(null);setScreen("title");}} style={{...btn,padding:"10px 28px"}}>Play Again</button>
    </div>
  );

  if(screen==="battle"&&game){
    const{player,boss,weather,turn:t,logs,over,winner,dodge,protect,poisoned,poisonTurns,websMelted,minionActive}=game;
    const sHPpct=player.curHP/player.hp*100,bHPpct=boss.curHP/boss.hp*100;
    const dc=DIFF_COLOR[boss.diff]||{bg:"#003300",col:"#00ff44"};
    const livesLeft=over&&winner==="boss"?lives-1:lives;
    const isAcid=boss.acidMeltsWebs;
    return(
      <div style={{padding:"1rem"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10,flexWrap:"wrap",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12,fontWeight:700,color:"#666"}}>Lv {boss.id}/17</span>
            <span style={{fontSize:11,background:dc.bg,color:dc.col,padding:"1px 8px",borderRadius:99,fontWeight:700}}>{boss.diff}</span>
          </div>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            <span style={{fontSize:11,color:"#666"}}>Lives:</span>
            {Array.from({length:MAX_LIVES}).map((_,i)=>(
              <span key={i} style={{fontSize:14}}>{i<(over&&winner==="boss"?livesLeft:lives)?"❤️":"🖤"}</span>
            ))}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",borderRadius:8,background:"#f0efe8",border:"0.5px solid #ddd",fontSize:11}}>
            <span style={{fontSize:14}}>{weather.icon}</span>
            <span style={{fontWeight:700,color:"#111"}}>{weather.name}</span>
            <span style={{color:"#666",fontSize:10}}>— {weather.desc}</span>
          </div>
        </div>
        {isAcid&&(
          <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
            {poisoned&&<span style={{fontSize:11,background:"#d4f5d4",color:"#0a2e0a",padding:"2px 8px",borderRadius:99}}>☣️ Poisoned ({poisonTurns} turns)</span>}
            {websMelted&&<span style={{fontSize:11,background:"#FAEEDA",color:"#633806",padding:"2px 8px",borderRadius:99}}>🫧 Webs melted!</span>}
            {minionActive&&<span style={{fontSize:11,background:"#FCEBEB",color:"#791F1F",padding:"2px 8px",borderRadius:99}}>☣️ Minion active!</span>}
          </div>
        )}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          {[
            {label:player.name,FaceComp:player.face,hp:player.curHP,max:player.hp,pct:sHPpct,color:player.color,border:player.color,statusDodge:dodge>0,statusProt:protect,isPlayer:true},
            {label:boss.name,FaceComp:boss.face,hp:boss.curHP,max:boss.hp,pct:bHPpct,color:boss.color,border:boss.color},
          ].map((f,i)=>(
            <div key={i} style={{...card,borderTop:`3px solid ${f.border}`,textAlign:"center"}}>
              <FaceAnim FaceComp={f.FaceComp} pulse={t===(f.isPlayer?"player":"boss")&&!over} size={60}/>
              <div style={{fontSize:12,fontWeight:700,color:"#111",marginBottom:5,marginTop:4}}>{f.label}</div>
              <HpBar pct={f.pct} color={f.color}/>
              <div style={{fontSize:11,fontWeight:700,color:"#111",marginTop:3}}>{Math.max(0,f.hp)} / {f.max}</div>
              {f.statusDodge&&<div style={{marginTop:3}}><span style={{fontSize:10,background:"#EEEDFE",color:"#3C3489",padding:"1px 7px",borderRadius:99}}>⚡ Dodging</span></div>}
              {f.statusProt&&<div style={{marginTop:3}}><span style={{fontSize:10,background:"#EAF3DE",color:"#3B6D11",padding:"1px 7px",borderRadius:99}}>🛡️ Protected</span></div>}
            </div>
          ))}
        </div>
        <div ref={logRef} style={{background:"#f0efe8",borderRadius:10,padding:"10px 12px",marginBottom:10,minHeight:72,maxHeight:120,overflowY:"auto"}}>
          {logs.map((l,i)=>(
            <div key={i} style={{fontSize:12,lineHeight:1.6,color:"#111",fontWeight:i===logs.length-1?700:400,padding:"1px 0"}}>{l}</div>
          ))}
        </div>
        {!over&&(
          <>
            <div style={{textAlign:"center",marginBottom:7}}>
              <span style={{fontSize:12,fontWeight:700,padding:"4px 12px",borderRadius:99,background:t==="player"?player.light:"#FCEBEB",color:t==="player"?player.dark:"#A32D2D"}}>
                {t==="player"?`${player.name}'s turn`:`${boss.name} is attacking...`}
              </span>
            </div>
            {isAcid&&t==="player"&&<p style={{fontSize:11,color:"#00aa22",textAlign:"center",marginBottom:6}}>⚡ Electric moves are super effective vs Acid!</p>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
              {player.moves.map((m,i)=>{
                const isBlocked=websMelted&&(m.icon==="🕸️"||m.name==="Web Shield"||m.name==="Web Slam");
                return(
                  <button key={i} disabled={t!=="player"} onClick={()=>playerMove(m)}
                    style={{...btn,opacity:t==="player"?1:0.4,cursor:t==="player"?"pointer":"not-allowed",textAlign:"left",
                      border:isBlocked?"0.5px solid #F7C1C1":"0.5px solid #bbb",
                      background:isBlocked?"#FCEBEB":"#fff"}}>
                    <div style={{fontSize:15,marginBottom:2}}>{m.icon}</div>
                    <div style={{fontSize:12,fontWeight:700,color:isBlocked?"#A32D2D":"#111"}}>{m.name}{isBlocked?" 🚫":""}</div>
                    <div style={{fontSize:10,color:"#666",marginTop:1}}>{m.sp==="dodge"?"Dodge next attack!":m.sp==="protect"?"Block + "+m.dmg[0]+"-"+m.dmg[1]+" dmg":m.dmg[0]+"-"+m.dmg[1]+" dmg"}</div>
                  </button>
                );
              })}
            </div>
          </>
        )}
        {over&&(
          <div style={{marginTop:10}}>
            <div style={{textAlign:"center",padding:"1rem",borderRadius:10,background:winner==="player"?"#EAF3DE":"#FCEBEB",border:`0.5px solid ${winner==="player"?"#C0DD97":"#F7C1C1"}`,marginBottom:10}}>
              <div style={{fontSize:17,fontWeight:700,color:winner==="player"?"#27500A":"#791F1F"}}>
                {winner==="player"?`🏆 ${player.name} wins!`:`💀 You lost! ${livesLeft} ${livesLeft===1?"life":"lives"} left`}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {winner==="player"&&levelIdx<LEVELS.length-1&&(
                <button onClick={()=>{setLevelIdx(levelIdx+1);setScreen("levelup");}} style={{...btn,background:"#EAF3DE",color:"#27500A",border:"0.5px solid #C0DD97",fontWeight:700}}>Next Level ↗</button>
              )}
              {winner==="player"&&levelIdx>=LEVELS.length-1&&(
                <button onClick={()=>setScreen("gamecomplete")} style={{...btn,background:"#EAF3DE",color:"#27500A",border:"0.5px solid #C0DD97",fontWeight:700}}>🏅 Victory!</button>
              )}
              {winner==="boss"&&livesLeft>0&&(
                <button onClick={()=>startLevel(player.id,levelIdx,livesLeft)} style={{...btn,background:"#FAEEDA",color:"#633806",border:"0.5px solid #FAC775",fontWeight:700}}>
                  Retry ({livesLeft} {livesLeft===1?"life":"lives"} left)
                </button>
              )}
              {winner==="boss"&&livesLeft<=0&&(
                <button onClick={()=>setScreen("gameover")} style={{...btn,background:"#FCEBEB",color:"#791F1F",border:"0.5px solid #F7C1C1",fontWeight:700}}>Game Over 💀</button>
              )}
              <button onClick={()=>{setSelectedPlayer(null);setScreen("title");}} style={{...btn}}>Main Menu</button>
            </div>
          </div>
        )}
      </div>
    );
  }
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
